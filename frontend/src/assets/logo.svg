<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" fill="none">
  <!-- Body -->
  <rect x="4" y="12" width="52" height="20" rx="3" fill="#D97706"/>
  <!-- Cab front -->
  <path d="M48 12 L56 12 Q60 12 60 18 L60 32 L48 32 Z" fill="#B45309"/>
  <!-- Windshield -->
  <rect x="49" y="14" width="9" height="10" rx="1" fill="#BAE6FD" opacity="0.85"/>
  <!-- Side windows -->
  <rect x="8"  y="15" width="10" height="8" rx="1" fill="#BAE6FD" opacity="0.85"/>
  <rect x="21" y="15" width="10" height="8" rx="1" fill="#BAE6FD" opacity="0.85"/>
  <rect x="34" y="15" width="10" height="8" rx="1" fill="#BAE6FD" opacity="0.85"/>
  <!-- Roof rack stripes -->
  <rect x="4" y="10" width="52" height="3" rx="1" fill="#92400E"/>
  <line x1="16" y1="10" x2="16" y2="13" stroke="#78350F" stroke-width="1"/>
  <line x1="28" y1="10" x2="28" y2="13" stroke="#78350F" stroke-width="1"/>
  <line x1="40" y1="10" x2="40" y2="13" stroke="#78350F" stroke-width="1"/>
  <!-- Door line -->
  <line x1="45" y1="13" x2="45" y2="32" stroke="#92400E" stroke-width="1"/>
  <!-- Bumper -->
  <rect x="57" y="28" width="3" height="4" rx="1" fill="#78350F"/>
  <rect x="4"  y="28" width="3" height="4" rx="1" fill="#78350F"/>
  <!-- Wheels -->
  <circle cx="16" cy="33" r="5" fill="#1C1917"/>
  <circle cx="16" cy="33" r="2.5" fill="#78716C"/>
  <circle cx="16" cy="33" r="1" fill="#1C1917"/>
  <circle cx="48" cy="33" r="5" fill="#1C1917"/>
  <circle cx="48" cy="33" r="2.5" fill="#78716C"/>
  <circle cx="48" cy="33" r="1" fill="#1C1917"/>
  <!-- Headlight -->
  <rect x="57" y="16" width="3" height="4" rx="1" fill="#FDE68A"/>
  <!-- Flower decal on body -->
  <circle cx="6" cy="24" r="1.2" fill="#FCD34D"/>
  <circle cx="8" cy="22.5" r="0.8" fill="#F87171"/>
  <circle cx="8" cy="25.5" r="0.8" fill="#F87171"/>
  <circle cx="6" cy="21.5" r="0.8" fill="#F87171"/>
  <circle cx="6" cy="26.5" r="0.8" fill="#F87171"/>
  <circle cx="4" cy="22.5" r="0.8" fill="#F87171"/>
  <circle cx="4" cy="25.5" r="0.8" fill="#F87171"/>
</svg>
